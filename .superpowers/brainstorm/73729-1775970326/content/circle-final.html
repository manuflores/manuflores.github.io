<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d0d; color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; gap: 14px;
}
h1 { font-size: 1.05rem; font-weight: 700; color: #f9f9f7; letter-spacing: -0.02em; }
canvas { display: block; border-radius: 12px; background: #0a0a0a; }
.lbl { font-size: 0.68rem; color: #4b5563; max-width: 420px; text-align: center; line-height: 1.6; }
.lbl em { color: #6ee7b7; font-style: normal; }
</style>
</head>
<body>
<h1>H₁ · Vietoris-Rips on a cell manifold</h1>
<canvas id="c" width="480" height="480"></canvas>
<div class="lbl">
  Gray = zero gradient &nbsp;·&nbsp; <em>Green</em> = cohomology representative cells &nbsp;·&nbsp;
  <em>Bright edge</em> = critical edge (birth of H₁) &nbsp;·&nbsp; Arrows = ∇ℒ outward
</div>

<script>
function mkRng(seed) {
  let s = seed;
  return () => { s = (s*16807)%2147483647; return (s-1)/2147483646; };
}

function drawArrow(ctx, x, y, nx, ny, len, alpha) {
  if (alpha < 0.01) return;
  const ex=x+nx*len, ey=y+ny*len, h=7, a=Math.atan2(ny,nx);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#6ee7b7'; ctx.lineWidth = 1.6;
  ctx.shadowColor = '#6ee7b7'; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(ex,ey);
  ctx.lineTo(ex-h*Math.cos(a-0.4), ey-h*Math.sin(a-0.4));
  ctx.moveTo(ex,ey);
  ctx.lineTo(ex-h*Math.cos(a+0.4), ey-h*Math.sin(a+0.4));
  ctx.stroke();
  ctx.restore();
}

// ── Build point cloud ────────────────────────────────────────────────────────
const rng = mkRng(42);
const W=480, H=480, cx=W/2, cy=H/2, R=W*0.35;
const N = 110;

// Random angles — slightly sparser in arc [π/6, π/2] to create a natural gap
// where the critical edge will appear
const LO = Math.PI/6, HI = Math.PI/2;
const rawAngles = [];
while (rawAngles.length < N) {
  const a = rng() * Math.PI * 2;
  const inGapArc = a >= LO && a <= HI;
  // Accept with 50% probability in the gap arc → creates a sparser region there
  if (inGapArc && rng() > 0.52) continue;
  rawAngles.push(a);
}
rawAngles.sort((a,b)=>a-b);

const pts = rawAngles.map(a => {
  const r = 1 + (rng()-0.5)*0.09;      // radial noise
  const jx = (rng()-0.5)*0.045;        // tangential noise
  const jy = (rng()-0.5)*0.045;
  return { x: r*Math.cos(a)+jx, y: r*Math.sin(a)+jy, angle: a };
});

// ── Vietoris-Rips edges (all length ≤ ε) ─────────────────────────────────────
// ε ≈ 1.8× mean spacing (on unit circle, N=110 → spacing≈0.057, ε≈0.18)
const EPS = 0.19;
const edges = [];
for (let i=0;i<N;i++) for (let j=i+1;j<N;j++) {
  const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
  const d = Math.hypot(dx,dy);
  if (d <= EPS) edges.push({i, j, d});
}

// ── Critical edge: longest Rips edge in the gap arc [π/6, π/2] ───────────────
// (This is the birth-critical edge for H₁ — it bridges the largest local gap)
function inArc(i) {
  const a = ((pts[i].angle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  return a >= LO && a <= HI;
}
let critEdge = null, critLen = 0;
for (const e of edges) {
  if (inArc(e.i) && inArc(e.j) && e.d > critLen) {
    critLen = e.d; critEdge = e;
  }
}
// Fallback: longest edge overall
if (!critEdge) { critEdge = edges.reduce((m,e)=>e.d>m.d?e:m, edges[0]); }

// ── Cohomology representative cells ──────────────────────────────────────────
// Seed from critical edge vertices, then expand via 3 hops of Rips neighbors
// staying within the arc — gives ~3× coverage vs. just 1-hop.
const coV = new Set();
if (critEdge) {
  coV.add(critEdge.i);
  coV.add(critEdge.j);
  // Build adjacency for fast lookup
  const adj = Array.from({length:N}, ()=>[]);
  for (const e of edges) { adj[e.i].push(e.j); adj[e.j].push(e.i); }
  // Expand 3 hops, staying in or near the arc
  for (let hop=0; hop<3; hop++) {
    for (const i of [...coV]) {
      for (const j of adj[i]) {
        if (inArc(j)) coV.add(j);
      }
    }
  }
}

// ── Animation ────────────────────────────────────────────────────────────────
let T = 0;
const STEADY=110, PULSE=70, FLASH=18, REFORM=55, TOTAL=STEADY+PULSE+FLASH+REFORM;

function phase() {
  const c = T % TOTAL;
  if (c < STEADY)              return { a:0,      flash:0,   op:1 };
  if (c < STEADY+PULSE) {
    const p=(c-STEADY)/PULSE;
    return { a: p,             flash:0,   op:1 };
  }
  if (c < STEADY+PULSE+FLASH) {
    const p=(c-STEADY-PULSE)/FLASH;
    return { a: 1-p,           flash:p,   op:1 };
  }
  const p=(c-STEADY-PULSE-FLASH)/REFORM;
  return { a:0, flash:0, op:p };
}

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

function draw() {
  const { a: arrowA, flash, op } = phase();
  const critPulse = arrowA > 0 ? arrowA : 0.25 + 0.15*Math.sin(T*0.04); // gentle ambient pulse

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = op;

  // ── All Rips edges — uniform length ≤ ε, faint grey mesh ──────────────────
  for (const e of edges) {
    if (critEdge && e.i===critEdge.i && e.j===critEdge.j) continue; // draw critical edge last
    ctx.strokeStyle = 'rgba(31,41,55,0.72)'; ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.moveTo(cx+pts[e.i].x*R, cy-pts[e.i].y*R);
    ctx.lineTo(cx+pts[e.j].x*R, cy-pts[e.j].y*R);
    ctx.stroke();
  }

  // ── Critical edge — always visible, glowing ────────────────────────────────
  if (critEdge) {
    const p0=pts[critEdge.i], p1=pts[critEdge.j];
    const sx0=cx+p0.x*R, sy0=cy-p0.y*R;
    const sx1=cx+p1.x*R, sy1=cy-p1.y*R;

    // Outer glow
    ctx.strokeStyle=`rgba(16,185,129,${0.12*critPulse})`; ctx.lineWidth=8;
    ctx.beginPath(); ctx.moveTo(sx0,sy0); ctx.lineTo(sx1,sy1); ctx.stroke();
    // Core
    ctx.strokeStyle=`rgba(16,185,129,${0.7+0.3*critPulse})`; ctx.lineWidth=1.8;
    ctx.shadowColor='#10b981'; ctx.shadowBlur=10*critPulse;
    ctx.beginPath(); ctx.moveTo(sx0,sy0); ctx.lineTo(sx1,sy1); ctx.stroke();
    ctx.shadowBlur=0;

  }

  // ── Cells ─────────────────────────────────────────────────────────────────
  for (let i=0;i<N;i++) {
    const p=pts[i]; const isCo=coV.has(i);
    const isCrit = critEdge && (i===critEdge.i || i===critEdge.j);
    const r = isCrit ? 4.5 : isCo ? 3.4 : 2.2;
    ctx.beginPath(); ctx.arc(cx+p.x*R, cy-p.y*R, r, 0, Math.PI*2);
    if (isCrit) {
      ctx.fillStyle = '#6ee7b7';
      ctx.shadowColor='#6ee7b7'; ctx.shadowBlur=10;
    } else if (isCo) {
      ctx.fillStyle = '#10b981';
      ctx.shadowColor='#10b981'; ctx.shadowBlur=4;
    } else {
      ctx.fillStyle = '#374151';
    }
    ctx.fill(); ctx.shadowBlur=0;
  }

  // ── Gradient arrows — direction from local cohomology geometry (organic) ───
  // Each cohomology cell is pushed away from its cohomology-connected neighbors.
  // This is the actual ∇ℒ structure and produces naturally varied arrow directions.
  if (arrowA > 0.01) {
    for (const i of coV) {
      // Accumulate push direction: away from each cohomology neighbor via a Rips edge
      let gx=0, gy=0;
      for (const e of edges) {
        const other = e.i===i ? e.j : e.j===i ? e.i : -1;
        if (other < 0 || !coV.has(other)) continue;
        const dx=pts[i].x-pts[other].x, dy=pts[i].y-pts[other].y;
        const l=Math.hypot(dx,dy)||1;
        gx+=dx/l; gy+=dy/l;
      }
      // Fallback to radial if isolated in the cohomology set
      const gl=Math.hypot(gx,gy);
      if (gl < 0.1) { gx=pts[i].x; gy=pts[i].y; }
      const gl2=Math.hypot(gx,gy)||1;
      const nx=gx/gl2, ny=-gy/gl2;   // screen: y flipped
      const sx=cx+pts[i].x*R, sy=cy-pts[i].y*R;
      const isCrit = critEdge && (i===critEdge.i || i===critEdge.j);
      drawArrow(ctx, sx+nx*5, sy+ny*5, nx, ny, isCrit?24:16, arrowA*(isCrit?1:0.72));
    }
  }

  // ── Flash ─────────────────────────────────────────────────────────────────
  if (flash > 0.01) {
    ctx.fillStyle=`rgba(110,231,183,${flash*0.22})`; ctx.fillRect(0,0,W,H);
  }

  ctx.globalAlpha=1;
  T++;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
